<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VOICE WORKOUT LOG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;800&family=IBM+Plex+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #EDEEF0;
    --board: #16181A;
    --board-line: #2A2D30;
    --accent: #E23D2E;
    --ink: #1A1C1E;
    --ink-sub: #5F6368;
    --bar: #6B7076;
    --card: #FFFFFF;
    --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "IBM Plex Sans JP", sans-serif;
    display: flex;
    justify-content: center;
  }
  .num { font-family: "Archivo", "IBM Plex Sans JP", sans-serif; font-feature-settings: "tnum"; font-variant-numeric: tabular-nums; }
  #app { width: 100%; max-width: 480px; min-height: 100%; display: flex; flex-direction: column; padding-bottom: 84px; }

  /* ── header ── */
  header {
    background: var(--board);
    color: #fff;
    padding: 18px 20px 14px;
    border-bottom: 3px solid var(--accent);
  }
  header h1 { font-family: "Archivo", sans-serif; font-weight: 800; font-size: 18px; letter-spacing: 2px; }
  header .date { font-size: 12px; color: #9AA0A6; margin-top: 2px; }

  /* ── tabs (bottom nav) ── */
  nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    display: flex; background: var(--board); z-index: 20;
    border-top: 1px solid var(--board-line);
  }
  nav button {
    flex: 1; padding: 14px 0 16px; background: none; border: none;
    color: #9AA0A6; font-family: "IBM Plex Sans JP", sans-serif; font-size: 13px; font-weight: 700;
    cursor: pointer;
  }
  nav button.active { color: #fff; box-shadow: inset 0 3px 0 var(--accent); }

  main { flex: 1; padding: 16px; }
  .screen { display: none; }
  .screen.visible { display: block; }

  /* ── scoreboard ── */
  .board {
    background: var(--board); color: #fff;
    border-radius: var(--radius); padding: 18px 20px;
    min-height: 118px;
    display: flex; flex-direction: column; justify-content: center;
    box-shadow: 0 4px 14px rgba(0,0,0,.18);
  }
  .board .label { font-size: 11px; letter-spacing: 2px; color: #9AA0A6; margin-bottom: 6px; }
  .board .main-line { font-size: 22px; font-weight: 700; line-height: 1.3; word-break: break-all; }
  .board .figures { display: flex; gap: 22px; margin-top: 8px; }
  .board .fig .v { font-size: 40px; font-weight: 800; line-height: 1; }
  .board .fig .u { font-size: 12px; color: #9AA0A6; margin-left: 3px; }
  .board.err .main-line { color: #FF8A7A; font-size: 15px; font-weight: 500; }
  .board .hint { font-size: 12px; color: #9AA0A6; margin-top: 6px; }

  /* ── mic ── */
  .mic-wrap { display: flex; flex-direction: column; align-items: center; padding: 22px 0 10px; }
  #micBtn {
    width: 88px; height: 88px; border-radius: 50%;
    border: none; cursor: pointer;
    background: var(--board); color: #fff;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 18px rgba(0,0,0,.25);
    transition: background .2s;
  }
  #micBtn.on { background: var(--accent); animation: pulse 1.4s infinite; }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(226,61,46,.45); }
    70%  { box-shadow: 0 0 0 22px rgba(226,61,46,0); }
    100% { box-shadow: 0 0 0 0 rgba(226,61,46,0); }
  }
  #micBtn svg { width: 38px; height: 38px; fill: currentColor; }
  .mic-state { margin-top: 10px; font-size: 13px; font-weight: 700; color: var(--ink-sub); }
  .mic-state.on { color: var(--accent); }
  .interim { min-height: 20px; font-size: 13px; color: var(--ink-sub); margin-top: 4px; text-align: center; padding: 0 10px; }

  /* ── set list ── */
  h2 { font-size: 13px; font-weight: 700; letter-spacing: 1px; color: var(--ink-sub); margin: 18px 0 8px; }
  .set-card {
    background: var(--card); border-radius: 10px; padding: 12px 14px;
    display: flex; align-items: center; gap: 12px; margin-bottom: 8px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  .set-card .part-tag {
    font-size: 10px; font-weight: 700; color: #fff; background: var(--bar);
    border-radius: 4px; padding: 2px 6px; flex-shrink: 0;
  }
  .set-card .ex { font-weight: 700; font-size: 14px; flex: 1; min-width: 0; }
  .set-card .ex small { display: block; font-weight: 400; font-size: 11px; color: var(--ink-sub); }
  .set-card .wr { font-size: 18px; font-weight: 800; white-space: nowrap; }
  .set-card .wr .u { font-size: 11px; font-weight: 500; color: var(--ink-sub); }
  .set-card .del {
    border: none; background: none; color: #C4C7CC; font-size: 18px; cursor: pointer; padding: 4px 6px;
  }
  .empty { text-align: center; color: var(--ink-sub); font-size: 13px; padding: 26px 0; }

  /* ── chips ── */
  .chips { display: flex; gap: 8px; overflow-x: auto; padding: 2px 0 8px; scrollbar-width: none; }
  .chips::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0; border: 1.5px solid #D4D6DA; background: var(--card);
    color: var(--ink); border-radius: 999px; padding: 7px 15px;
    font-family: "IBM Plex Sans JP", sans-serif; font-size: 13px; font-weight: 500; cursor: pointer;
  }
  .chip.active { background: var(--board); border-color: var(--board); color: #fff; font-weight: 700; }
  .chip.part.active { background: var(--accent); border-color: var(--accent); }
  .chip .cnt { font-size: 11px; color: inherit; opacity: .65; margin-left: 4px; }

  /* ── history ── */
  .panel { background: var(--card); border-radius: var(--radius); padding: 16px; margin-top: 6px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .panel h3 { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
  .panel .sub { font-size: 11px; color: var(--ink-sub); margin-bottom: 10px; }
  .legend { display: flex; gap: 16px; font-size: 11px; color: var(--ink-sub); margin: 8px 0 4px; }
  .legend .key { display: inline-block; width: 14px; height: 3px; border-radius: 2px; vertical-align: middle; margin-right: 5px; }
  #chartWrap { position: relative; }
  #chart { width: 100%; display: block; touch-action: pan-y; }
  #tooltip {
    position: absolute; pointer-events: none; display: none;
    background: var(--board); color: #fff; font-size: 11px; line-height: 1.5;
    border-radius: 8px; padding: 7px 10px; white-space: nowrap; z-index: 5;
    transform: translate(-50%, -110%);
  }
  #tooltip b { font-family: "Archivo", sans-serif; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 12px; }
  th { text-align: left; color: var(--ink-sub); font-weight: 500; padding: 6px 4px; border-bottom: 1px solid #E4E5E8; }
  td { padding: 7px 4px; border-bottom: 1px solid #F0F1F3; }
  td.n, th.n { text-align: right; font-family: "Archivo", sans-serif; font-variant-numeric: tabular-nums; }

  /* 部位サマリー */
  .part-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 6px; }
  .part-tile { background: var(--card); border-radius: 10px; padding: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .part-tile .p { font-size: 11px; font-weight: 700; color: var(--ink-sub); }
  .part-tile .v { font-size: 24px; font-weight: 800; margin-top: 2px; }
  .part-tile .v small { font-size: 11px; font-weight: 500; color: var(--ink-sub); }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>VOICE WORKOUT LOG</h1>
    <div class="date num" id="todayDate"></div>
  </header>

  <main>
    <!-- 記録画面 -->
    <section class="screen visible" id="screen-record">
      <div class="board" id="board">
        <div class="label">READY</div>
        <div class="main-line">マイクをタップして<br>「ベンチプレス 60キロ 10回」と話してください</div>
      </div>
      <div class="mic-wrap">
        <button id="micBtn" aria-label="音声入力">
          <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg>
        </button>
        <div class="mic-state" id="micState">タップして開始</div>
        <div class="interim" id="interim"></div>
      </div>
      <h2>今日のセット</h2>
      <div id="todaySets"></div>
    </section>

    <!-- 履歴画面 -->
    <section class="screen" id="screen-history">
      <h2>部位で絞り込み</h2>
      <div class="chips" id="partChips"></div>
      <div class="part-summary" id="partSummary"></div>
      <h2>種目</h2>
      <div class="chips" id="exChips"></div>
      <div id="historyBody"></div>
    </section>
  </main>

  <nav>
    <button id="tab-record" class="active">記録</button>
    <button id="tab-history">履歴</button>
  </nav>
</div>

<script>
"use strict";

/* ══════════ 種目マスタ(部位付き) ══════════ */
const BODY_PARTS = ["胸", "肩", "背中", "脚", "腕"];
const EXERCISES = [
  { name: "ベンチプレス",     part: "胸",   aliases: ["ベンチ", "べんち"] },
  { name: "腕立て伏せ",       part: "胸",   aliases: ["腕立て", "うでたて", "プッシュアップ"] },
  { name: "ショルダープレス", part: "肩",   aliases: ["ショルダー"] },
  { name: "サイドレイズ",     part: "肩",   aliases: ["サイド", "レイズ"] },
  { name: "デッドリフト",     part: "背中", aliases: ["デッド"] },
  { name: "ラットプルダウン", part: "背中", aliases: ["ラットプル", "ラット"] },
  { name: "懸垂",             part: "背中", aliases: ["けんすい", "チンニング"] },
  { name: "スクワット",       part: "脚",   aliases: ["スクワ"] },
  { name: "レッグプレス",     part: "脚",   aliases: ["レッグ"] },
  { name: "アームカール",     part: "腕",   aliases: ["カール", "アーム"] },
];
function partOf(exName) {
  const ex = EXERCISES.find(e => e.name === exName);
  return ex ? ex.part : "その他";
}

/* ══════════ 数値正規化(全角・漢数字) ══════════ */
function normalizeNumbers(text) {
  // 全角 → 半角
  text = text.replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
  // 漢数字(〜千の範囲)を連続ブロック単位で変換
  return text.replace(/[〇零一二三四五六七八九十百千]+/g, block => {
    const digits = { "〇":0,"零":0,"一":1,"二":2,"三":3,"四":4,"五":5,"六":6,"七":7,"八":8,"九":9 };
    let total = 0, current = 0, used = false;
    for (const ch of block) {
      if (ch in digits) { current = digits[ch]; used = true; }
      else if (ch === "十") { total += (current || 1) * 10; current = 0; used = true; }
      else if (ch === "百") { total += (current || 1) * 100; current = 0; used = true; }
      else if (ch === "千") { total += (current || 1) * 1000; current = 0; used = true; }
    }
    total += current;
    return used ? String(total) : block;
  });
}

/* ══════════ 発話解析 ══════════ */
// 戻り値: {type:"set", exercise, weight, reps} | {type:"undo"} | {type:"incomplete", reason}
function parseUtterance(raw, lastSet) {
  const text = normalizeNumbers(raw).trim();

  if (/(取り消し|とりけし|キャンセル|訂正|削除)/.test(text)) return { type: "undo" };

  // 種目マッチ(長い別名を優先)
  let exercise = null;
  const candidates = [];
  for (const ex of EXERCISES) {
    for (const key of [ex.name, ...ex.aliases]) {
      if (text.includes(key)) candidates.push({ name: ex.name, len: key.length });
    }
  }
  if (candidates.length) {
    candidates.sort((a, b) => b.len - a.len);
    exercise = candidates[0].name;
  }

  const sameAgain = /(同じの|おなじの|同じやつ|さっきの)/.test(text);

  // 重量・回数
  const wMatch = text.match(/(\d+(?:\.\d+)?)\s*(?:キロ|きろ|kg|ｋｇ|kirogram)/i);
  const rMatch = text.match(/(\d+)\s*(?:回|かい|レップ|rep)/i);
  let weight = wMatch ? parseFloat(wMatch[1]) : null;
  let reps = rMatch ? parseInt(rMatch[1], 10) : null;

  // 「同じの 8回」: 直前の種目・重量を引き継ぐ
  if (sameAgain && lastSet) {
    exercise = exercise || lastSet.exercise;
    if (weight === null) weight = lastSet.weight;
  }
  // 種目省略「65キロ 8回」: 直前の種目を引き継ぐ
  if (!exercise && (weight !== null || reps !== null) && lastSet) {
    exercise = lastSet.exercise;
  }

  if (!exercise && reps === null) return { type: "incomplete", reason: "種目と回数が聞き取れませんでした" };
  if (!exercise) return { type: "incomplete", reason: "種目が聞き取れませんでした" };
  if (reps === null) return { type: "incomplete", reason: "回数が聞き取れませんでした" };

  return { type: "set", exercise, weight, reps };
}

/* ══════════ 永続化 ══════════ */
const STORE_KEY = "voice-workout-sets";
function loadSets() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
  catch { return []; }
}
function saveSets(sets) { localStorage.setItem(STORE_KEY, JSON.stringify(sets)); }
let sets = loadSets();

/* ══════════ TTS ══════════ */
// TTSの復唱をマイクが拾って再入力される自己ループを防ぐため、
// 発話中は認識を止め、読み上げ完了後に再開する
let ttsSpeaking = false;
function speak(text) {
  if (!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "ja-JP";
  u.rate = 1.05;
  ttsSpeaking = true;
  if (recognition && recognizing) {
    try { recognition.stop(); } catch {}
  }
  const resume = () => {
    // 読み上げ直後の残響を拾わないよう少し待ってから再開
    setTimeout(() => {
      ttsSpeaking = false;
      if (wantListening && !recognizing) {
        try { recognition.start(); } catch {}
      }
    }, 300);
  };
  u.onend = resume;
  u.onerror = resume;
  speechSynthesis.speak(u);
}

/* ══════════ 音声認識 ══════════ */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognizing = false;
let wantListening = false; // ユーザー意図(onendでの自動再開判定)
let recognition = null;

if (SR) {
  recognition = new SR();
  recognition.lang = "ja-JP";
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onresult = (ev) => {
    if (ttsSpeaking) return; // 復唱中に拾った音声は無視
    let interim = "";
    for (let i = ev.resultIndex; i < ev.results.length; i++) {
      const r = ev.results[i];
      if (r.isFinal) handleUtterance(r[0].transcript);
      else interim += r[0].transcript;
    }
    document.getElementById("interim").textContent = interim;
  };
  recognition.onstart = () => { recognizing = true; updateMicUI(); };
  recognition.onend = () => {
    recognizing = false;
    // TTS読み上げ中の停止は speak() 側が再開するのでここでは何もしない
    if (ttsSpeaking) return;
    // iOS Safari 等で勝手に切れた場合は再開
    if (wantListening) {
      try { recognition.start(); } catch { updateMicUI(); }
    } else updateMicUI();
  };
  recognition.onerror = (ev) => {
    if (ev.error === "not-allowed" || ev.error === "service-not-allowed") {
      wantListening = false;
      showBoardError("マイクの使用が許可されていません");
    }
  };
}

function toggleMic() {
  if (!SR) { showBoardError("このブラウザは音声認識に対応していません(Chrome推奨)"); return; }
  if (wantListening) {
    wantListening = false;
    recognition.stop();
  } else {
    wantListening = true;
    try { recognition.start(); } catch {}
    speak("どうぞ");
  }
  updateMicUI();
}

function updateMicUI() {
  const btn = document.getElementById("micBtn");
  const state = document.getElementById("micState");
  const on = wantListening;
  btn.classList.toggle("on", on);
  state.classList.toggle("on", on);
  state.textContent = on ? "聞き取り中…" : "タップして開始";
  if (!on) document.getElementById("interim").textContent = "";
}

/* ══════════ 発話処理 ══════════ */
// ブラウザによっては同じ確定結果が複数回届くことがあるため、
// 直近と同一の発話は短時間(2.5秒)内なら無視する
let lastTranscript = "";
let lastTranscriptAt = 0;
function handleUtterance(transcript) {
  const now = Date.now();
  const t = transcript.trim();
  if (t === lastTranscript && now - lastTranscriptAt < 2500) return;
  lastTranscript = t;
  lastTranscriptAt = now;

  const lastSet = sets.length ? sets[sets.length - 1] : null;
  const result = parseUtterance(transcript, lastSet);

  if (result.type === "undo") {
    if (lastSet) {
      sets.pop();
      saveSets(sets);
      speak("取り消しました");
      showBoard("UNDO", `${lastSet.exercise} を取り消しました`, null);
      renderToday();
    } else {
      speak("取り消すセットがありません");
    }
    return;
  }

  if (result.type === "incomplete") {
    speak("もう一度お願いします");
    showBoardError(`「${transcript}」 — ${result.reason}`);
    return;
  }

  const set = {
    id: Date.now() + "-" + Math.random().toString(36).slice(2, 7),
    exercise: result.exercise,
    weight: result.weight,
    reps: result.reps,
    timestamp: new Date().toISOString(),
  };
  sets.push(set);
  saveSets(sets);

  const wPart = set.weight !== null ? `${set.weight}キロ ` : "";
  speak(`${set.exercise} ${wPart}${set.reps}回、記録しました`);
  showBoard("LOGGED", set.exercise, set);
  renderToday();
}

/* ══════════ スコアボード表示 ══════════ */
function showBoard(label, mainText, set) {
  const board = document.getElementById("board");
  board.classList.remove("err");
  let figures = "";
  if (set) {
    const w = set.weight !== null
      ? `<div class="fig"><span class="v num">${set.weight}</span><span class="u">kg</span></div>`
      : `<div class="fig"><span class="v num" style="font-size:22px;line-height:1.8">自重</span></div>`;
    figures = `<div class="figures">${w}<div class="fig"><span class="v num">${set.reps}</span><span class="u">回</span></div></div>`;
  }
  board.innerHTML = `<div class="label">${label}</div><div class="main-line">${escapeHtml(mainText)}</div>${figures}`;
}
function showBoardError(msg) {
  const board = document.getElementById("board");
  board.classList.add("err");
  board.innerHTML = `<div class="label">RETRY</div><div class="main-line">${escapeHtml(msg)}</div><div class="hint">例:「ベンチプレス 60キロ 10回」</div>`;
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}

/* ══════════ 今日のセット一覧 ══════════ */
function isSameDay(iso, d) {
  const a = new Date(iso);
  return a.getFullYear() === d.getFullYear() && a.getMonth() === d.getMonth() && a.getDate() === d.getDate();
}
function renderToday() {
  const el = document.getElementById("todaySets");
  const today = new Date();
  const list = sets.filter(s => isSameDay(s.timestamp, today));
  if (!list.length) {
    el.innerHTML = `<div class="empty">まだ記録がありません</div>`;
    return;
  }
  el.innerHTML = list.slice().reverse().map(s => {
    const t = new Date(s.timestamp);
    const hm = `${String(t.getHours()).padStart(2,"0")}:${String(t.getMinutes()).padStart(2,"0")}`;
    const w = s.weight !== null ? `<span class="num">${s.weight}</span><span class="u">kg</span> × ` : "自重 × ";
    return `<div class="set-card">
      <span class="part-tag">${partOf(s.exercise)}</span>
      <div class="ex">${escapeHtml(s.exercise)}<small class="num">${hm}</small></div>
      <div class="wr">${w}<span class="num">${s.reps}</span><span class="u">回</span></div>
      <button class="del" data-id="${s.id}" aria-label="削除">✕</button>
    </div>`;
  }).join("");
}
document.getElementById("todaySets").addEventListener("click", (ev) => {
  const btn = ev.target.closest(".del");
  if (!btn) return;
  sets = sets.filter(s => s.id !== btn.dataset.id);
  saveSets(sets);
  renderToday();
});

/* ══════════ 履歴(部位別) ══════════ */
let selectedPart = "すべて";
let selectedExercise = null;

function exercisesInPart(part) {
  return EXERCISES.filter(e => part === "すべて" || e.part === part).map(e => e.name);
}
function setCountByExercise() {
  const m = {};
  for (const s of sets) m[s.exercise] = (m[s.exercise] || 0) + 1;
  return m;
}

function renderHistory() {
  renderPartChips();
  renderPartSummary();
  renderExChips();
  renderHistoryBody();
}

function renderPartChips() {
  const counts = {};
  for (const s of sets) {
    const p = partOf(s.exercise);
    counts[p] = (counts[p] || 0) + 1;
  }
  const el = document.getElementById("partChips");
  const parts = ["すべて", ...BODY_PARTS];
  el.innerHTML = parts.map(p => {
    const cnt = p === "すべて" ? sets.length : (counts[p] || 0);
    return `<button class="chip part ${selectedPart === p ? "active" : ""}" data-part="${p}">${p}<span class="cnt num">${cnt}</span></button>`;
  }).join("");
}

function renderPartSummary() {
  const el = document.getElementById("partSummary");
  if (selectedPart !== "すべて") { el.innerHTML = ""; el.style.display = "none"; return; }
  el.style.display = "";
  // 直近30日の部位別セット数
  const cutoff = Date.now() - 30 * 86400000;
  const counts = {};
  for (const s of sets) {
    if (new Date(s.timestamp).getTime() < cutoff) continue;
    const p = partOf(s.exercise);
    counts[p] = (counts[p] || 0) + 1;
  }
  el.innerHTML = BODY_PARTS.map(p =>
    `<div class="part-tile"><div class="p">${p}</div><div class="v num">${counts[p] || 0}<small> set/30日</small></div></div>`
  ).join("");
}

function renderExChips() {
  const counts = setCountByExercise();
  const names = exercisesInPart(selectedPart);
  // 記録がある種目を先頭に
  names.sort((a, b) => (counts[b] || 0) - (counts[a] || 0));
  if (!names.includes(selectedExercise)) selectedExercise = names.find(n => counts[n]) || names[0] || null;
  const el = document.getElementById("exChips");
  el.innerHTML = names.map(n =>
    `<button class="chip ${selectedExercise === n ? "active" : ""}" data-ex="${n}">${n}<span class="cnt num">${counts[n] || 0}</span></button>`
  ).join("");
}

document.getElementById("partChips").addEventListener("click", (ev) => {
  const chip = ev.target.closest(".chip");
  if (!chip) return;
  selectedPart = chip.dataset.part;
  selectedExercise = null;
  renderHistory();
});
document.getElementById("exChips").addEventListener("click", (ev) => {
  const chip = ev.target.closest(".chip");
  if (!chip) return;
  selectedExercise = chip.dataset.ex;
  renderExChips();
  renderHistoryBody();
});

/* 日付ごとの集計: 最大重量 & 総ボリューム */
function aggregateByDate(exName) {
  const byDate = new Map();
  for (const s of sets) {
    if (s.exercise !== exName) continue;
    const d = new Date(s.timestamp);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    if (!byDate.has(key)) byDate.set(key, { date: key, maxWeight: null, volume: 0, sets: 0 });
    const rec = byDate.get(key);
    rec.sets += 1;
    if (s.weight !== null) {
      rec.maxWeight = rec.maxWeight === null ? s.weight : Math.max(rec.maxWeight, s.weight);
      rec.volume += s.weight * s.reps;
    }
  }
  return [...byDate.values()].sort((a, b) => a.date < b.date ? -1 : 1);
}

let chartData = [];
let chartGeom = null;

function renderHistoryBody() {
  const el = document.getElementById("historyBody");
  if (!selectedExercise) {
    el.innerHTML = `<div class="empty">この部位の記録はまだありません</div>`;
    return;
  }
  chartData = aggregateByDate(selectedExercise);
  if (!chartData.length) {
    el.innerHTML = `<div class="empty">「${escapeHtml(selectedExercise)}」の記録はまだありません</div>`;
    return;
  }
  const hasWeight = chartData.some(d => d.maxWeight !== null);
  el.innerHTML = `<div class="panel">
    <h3>${escapeHtml(selectedExercise)} <span style="font-size:11px;font-weight:500;color:var(--ink-sub)">(${partOf(selectedExercise)})</span></h3>
    <div class="sub">日付ごとの推移</div>
    ${hasWeight ? `
      <div class="legend">
        <span><span class="key" style="background:var(--accent)"></span>最大重量 (kg)</span>
        <span><span class="key" style="background:var(--bar);height:8px;border-radius:2px"></span>総ボリューム (kg)</span>
      </div>
      <div id="chartWrap"><canvas id="chart" height="220"></canvas><div id="tooltip"></div></div>` : ""}
    <table>
      <thead><tr><th>日付</th><th class="n">最大重量</th><th class="n">総ボリューム</th><th class="n">セット数</th></tr></thead>
      <tbody>${chartData.slice().reverse().map(d => `<tr>
        <td class="num">${d.date.slice(5).replace("-", "/")}</td>
        <td class="n">${d.maxWeight !== null ? d.maxWeight + " kg" : "自重"}</td>
        <td class="n">${d.volume ? d.volume.toLocaleString() + " kg" : "—"}</td>
        <td class="n">${d.sets}</td>
      </tr>`).join("")}</tbody>
    </table>
  </div>`;
  if (hasWeight) requestAnimationFrame(drawChart);
}

/* ══════════ Canvasチャート(赤: 最大重量 / グレー棒: ボリューム) ══════════ */
function drawChart() {
  const canvas = document.getElementById("chart");
  if (!canvas) return;
  const data = chartData.filter(() => true);
  const wrap = canvas.parentElement;
  const cssW = wrap.clientWidth;
  const cssH = 220;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = cssW * dpr;
  canvas.height = cssH * dpr;
  canvas.style.height = cssH + "px";
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);

  const padL = 34, padR = 40, padT = 12, padB = 24;
  const plotW = cssW - padL - padR, plotH = cssH - padT - padB;

  const maxW = Math.max(...data.map(d => d.maxWeight || 0)) || 1;
  const maxV = Math.max(...data.map(d => d.volume)) || 1;
  const wTop = Math.ceil(maxW * 1.15 / 10) * 10;
  const vTop = Math.ceil(maxV * 1.15 / 100) * 100;

  const n = data.length;
  const slot = plotW / n;
  const xAt = i => padL + slot * i + slot / 2;
  const yW = v => padT + plotH * (1 - v / wTop);
  const yV = v => padT + plotH * (1 - v / vTop);

  // グリッド(控えめ)
  ctx.strokeStyle = "#EAEBED";
  ctx.lineWidth = 1;
  ctx.font = "10px Archivo, sans-serif";
  ctx.fillStyle = "#9AA0A6";
  for (let i = 0; i <= 4; i++) {
    const y = padT + plotH * i / 4;
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(cssW - padR, y); ctx.stroke();
    ctx.textAlign = "right";
    ctx.fillText(String(Math.round(wTop * (4 - i) / 4)), padL - 6, y + 3);
    ctx.textAlign = "left";
    ctx.fillText(String(Math.round(vTop * (4 - i) / 4)), cssW - padR + 6, y + 3);
  }

  // 棒: 総ボリューム(グレー、上端4px丸め、ベースライン接地)
  const barW = Math.min(22, slot * 0.5);
  ctx.fillStyle = "#6B7076";
  for (let i = 0; i < n; i++) {
    if (!data[i].volume) continue;
    const x = xAt(i) - barW / 2;
    const y = yV(data[i].volume);
    const h = padT + plotH - y;
    const r = Math.min(4, h);
    ctx.beginPath();
    ctx.moveTo(x, padT + plotH);
    ctx.lineTo(x, y + r);
    ctx.arcTo(x, y, x + r, y, r);
    ctx.lineTo(x + barW - r, y);
    ctx.arcTo(x + barW, y, x + barW, y + r, r);
    ctx.lineTo(x + barW, padT + plotH);
    ctx.closePath();
    ctx.fill();
  }

  // 折れ線: 最大重量(赤 2px + マーカー)
  const pts = [];
  for (let i = 0; i < n; i++) if (data[i].maxWeight !== null) pts.push({ x: xAt(i), y: yW(data[i].maxWeight), i });
  ctx.strokeStyle = "#E23D2E";
  ctx.lineWidth = 2;
  ctx.lineJoin = "round";
  if (pts.length > 1) {
    ctx.beginPath();
    pts.forEach((p, k) => k ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y));
    ctx.stroke();
  }
  for (const p of pts) {
    ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
    ctx.fillStyle = "#E23D2E"; ctx.fill();
    ctx.lineWidth = 2; ctx.strokeStyle = "#FFFFFF"; ctx.stroke();
  }

  // x軸ラベル(間引き)
  ctx.fillStyle = "#9AA0A6";
  ctx.textAlign = "center";
  const step = Math.ceil(n / Math.floor(plotW / 46));
  for (let i = 0; i < n; i += step) {
    ctx.fillText(data[i].date.slice(5).replace("-", "/"), xAt(i), cssH - 8);
  }

  chartGeom = { xAt, slot, n, padT, plotH, cssW };

  // ホバー/タップ ツールチップ
  canvas.onpointermove = canvas.onpointerdown = (ev) => {
    const rect = canvas.getBoundingClientRect();
    const px = ev.clientX - rect.left;
    let best = 0, bestDist = Infinity;
    for (let i = 0; i < n; i++) {
      const d = Math.abs(px - xAt(i));
      if (d < bestDist) { bestDist = d; best = i; }
    }
    if (bestDist > slot) { hideTooltip(); return; }
    const d = chartData[best];
    const tip = document.getElementById("tooltip");
    tip.innerHTML = `${d.date.slice(5).replace("-","/")}<br>最大 <b>${d.maxWeight !== null ? d.maxWeight + "kg" : "自重"}</b> / Vol <b>${d.volume.toLocaleString()}</b>`;
    tip.style.left = xAt(best) + "px";
    tip.style.top = (d.maxWeight !== null ? yW(d.maxWeight) : padT + 20) + "px";
    tip.style.display = "block";
  };
  canvas.onpointerleave = hideTooltip;
}
function hideTooltip() {
  const tip = document.getElementById("tooltip");
  if (tip) tip.style.display = "none";
}
window.addEventListener("resize", () => {
  if (document.getElementById("screen-history").classList.contains("visible")) drawChart();
});

/* ══════════ タブ切替 ══════════ */
function showScreen(name) {
  document.getElementById("screen-record").classList.toggle("visible", name === "record");
  document.getElementById("screen-history").classList.toggle("visible", name === "history");
  document.getElementById("tab-record").classList.toggle("active", name === "record");
  document.getElementById("tab-history").classList.toggle("active", name === "history");
  if (name === "history") renderHistory();
}
document.getElementById("tab-record").addEventListener("click", () => showScreen("record"));
document.getElementById("tab-history").addEventListener("click", () => showScreen("history"));
document.getElementById("micBtn").addEventListener("click", toggleMic);
